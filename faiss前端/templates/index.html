<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAISS 知识库管理</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
            word-break: break-all;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #f1f5f9;
        }

        .tab {
            padding: 16px 24px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            flex: 1;
            text-align: center;
        }

        .tab:hover {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--card-bg);
        }

        .tab-content {
            padding: 30px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            background: #f8fafc;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .dropzone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: #f8fafc;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .dropzone:hover, .dropzone.dragging {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .dropzone-icon {
            font-size: 48px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .dropzone-text {
            color: var(--text-main);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .dropzone-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .file-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .file-item i {
            color: var(--primary);
            margin-right: 10px;
        }

        .knowledge-list {
            margin-top: 20px;
            display: grid;
            gap: 12px;
        }

        .knowledge-item {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
        }

        .knowledge-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .knowledge-content {
            color: var(--text-main);
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .knowledge-score {
            color: var(--primary);
            font-weight: 600;
        }

        .status-message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            display: none;
            font-size: 0.95rem;
            align-items: center;
            gap: 10px;
        }

        .status-message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
            display: flex;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: flex;
        }
        
        .status-message.loading {
            background: #e0f2fe;
            color: #075985;
            border: 1px solid #bae6fd;
            display: flex;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        code {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-brain" style="color: var(--primary); margin-right: 15px;"></i>知识库</h1>
            <p>基于 RAG 的向量知识库管理系统，支持多模态数据录入</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" style="font-size: 1rem;">{{ index_dir }}</div>
                <div class="stat-label">索引存储路径</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ stats.total_vectors }}</div>
                <div class="stat-label">当前向量总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="font-size: 1rem;">{{ model }}</div>
                <div class="stat-label">Embedding 模型</div>
            </div>
        </div>

        <div class="main-card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('upload')"><i class="fas fa-cloud-upload-alt"></i> 文件上传</div>
                <div class="tab" onclick="switchTab('text')"><i class="fas fa-edit"></i> 文本录入</div>
                <div class="tab" onclick="switchTab('dir')"><i class="fas fa-folder-open"></i> 批量导入</div>
                <div class="tab" onclick="switchTab('browse')"><i class="fas fa-book-open"></i> 知识浏览</div>
            </div>

            <!-- 文件上传面板 -->
            <div id="upload" class="tab-content active">
                <div class="form-group">
                    <label>来源标识（可选）</label>
                    <input type="text" id="fileSource" placeholder="例如：高等数学-第一章-课件">
                </div>
                
                <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-cloud-upload-alt dropzone-icon"></i>
                    <div class="dropzone-text">点击或拖拽文件到此处上传</div>
                    <div class="dropzone-hint">支持 PDF, Word, PPT, TXT, MD 格式</div>
                    <input type="file" id="fileInput" multiple style="display: none" onchange="handleFiles(this.files)">
                </div>

                <div id="fileList" class="file-list"></div>

                <button class="btn btn-primary" style="margin-top: 20px;" onclick="uploadFiles()" id="btnUpload">
                    <i class="fas fa-paper-plane"></i> 开始处理并写入
                </button>
            </div>

            <!-- 文本录入面板 -->
            <div id="text" class="tab-content">
                <div class="form-group">
                    <label>来源标识（可选）</label>
                    <input type="text" id="textSource" placeholder="例如：手工录入-Q&A">
                </div>
                <div class="form-group">
                    <label>知识文本内容</label>
                    <textarea id="textContent" placeholder="在此粘贴知识点内容..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="submitText()" id="btnText">
                    <i class="fas fa-save"></i> 写入向量库
                </button>
            </div>

            <!-- 目录扫描面板 -->
            <div id="dir" class="tab-content">
                <div class="form-group">
                    <label>本地数据目录 (服务器端)</label>
                    <input type="text" id="dirPath" placeholder="例如：D:\ai大模型应用开发\师智分身\后端\data" value="D:\ai大模型应用开发\师智分身\后端\data">
                </div>
                <div class="form-group">
                    <label>文件类型匹配 (Glob)</label>
                    <input type="text" id="dirGlob" value="**/*.pdf" placeholder="例如：**/*.pdf">
                </div>
                <div class="form-group">
                    <label>导入模式</label>
                    <select id="dirMode">
                        <option value="append">增量追加 (推荐)</option>
                        <option value="replace">全量重建 (覆盖)</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="submitDir()" id="btnDir">
                    <i class="fas fa-sync-alt"></i> 开始批量导入
                </button>
            </div>

            <div id="browse" class="tab-content">
                <div class="form-group">
                    <label>来源筛选（可选）</label>
                    <input type="text" id="browseSource" placeholder="例如：数据结构 或 课件">
                </div>
                <div class="form-group">
                    <label>相似查询（可选）</label>
                    <input type="text" id="browseQuery" placeholder="输入问题或关键词进行相似检索">
                </div>
                <div class="form-group">
                    <label>返回数量</label>
                    <select id="browseLimit">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="searchKnowledge()" id="btnSearch">
                    <i class="fas fa-search"></i> 相似检索
                </button>
                <button class="btn btn-primary" style="margin-top: 12px;" onclick="loadKnowledgeList()" id="btnList">
                    <i class="fas fa-list"></i> 查看全部
                </button>
                <div id="knowledgeList" class="knowledge-list"></div>
            </div>
        </div>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        // Tab 切换逻辑
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            clearStatus();
        }

        // 状态显示逻辑
        function showStatus(type, message) {
            const el = document.getElementById('statusMessage');
            el.className = `status-message ${type}`;
            
            let icon = '';
            if (type === 'loading') icon = '<div class="loader"></div>';
            else if (type === 'success') icon = '<i class="fas fa-check-circle"></i>';
            else if (type === 'error') icon = '<i class="fas fa-exclamation-circle"></i>';
            
            el.innerHTML = `${icon}<span>${message}</span>`;
            el.style.display = 'flex';
        }

        function clearStatus() {
            document.getElementById('statusMessage').style.display = 'none';
        }

        // 文件处理逻辑
        let selectedFiles = [];
        const dropzone = document.getElementById('dropzone');

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragging');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragging');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragging');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            renderFileList();
        }

        function renderFileList() {
            const container = document.getElementById('fileList');
            container.innerHTML = '';
            selectedFiles.forEach(f => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <div><i class="far fa-file-alt"></i> ${f.name}</div>
                    <div style="color: #666; font-size: 0.8em;">${(f.size / 1024).toFixed(1)} KB</div>
                `;
                container.appendChild(div);
            });
        }

        // API 调用逻辑
        async function submitText() {
            const text = document.getElementById('textContent').value.trim();
            const source = document.getElementById('textSource').value.trim();
            const btn = document.getElementById('btnText');

            if (!text) return showStatus('error', '请输入文本内容');

            try {
                btn.disabled = true;
                showStatus('loading', '正在向量化写入，请稍候...');
                
                const res = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, source })
                });
                const data = await res.json();
                
                if (!res.ok || !data.ok) throw new Error(data.message);
                
                showStatus('success', `写入成功！新增向量 ${data.added_chunks} 条，总数：${data.total_vectors}`);
                document.getElementById('textContent').value = '';
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showStatus('error', e.message || '操作失败');
            } finally {
                btn.disabled = false;
            }
        }

        async function uploadFiles() {
            const source = document.getElementById('fileSource').value.trim();
            const btn = document.getElementById('btnUpload');

            if (!selectedFiles.length) return showStatus('error', '请先选择文件');

            try {
                btn.disabled = true;
                showStatus('loading', '正在解析并上传，文件较多时请耐心等待...');
                
                const formData = new FormData();
                selectedFiles.forEach(f => formData.append('files', f));
                formData.append('source', source);

                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (!res.ok || !data.ok) {
                    const detail = data.errors ? ` (${data.errors.join('; ')})` : '';
                    throw new Error(data.message + detail);
                }

                showStatus('success', `上传成功！处理 ${data.processed_files} 个文件，新增向量 ${data.added_chunks} 条`);
                selectedFiles = [];
                renderFileList();
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showStatus('error', e.message || '上传失败');
            } finally {
                btn.disabled = false;
            }
        }

        async function submitDir() {
            const source_dir = document.getElementById('dirPath').value.trim();
            const glob = document.getElementById('dirGlob').value.trim();
            const mode = document.getElementById('dirMode').value;
            const btn = document.getElementById('btnDir');

            if (!source_dir) return showStatus('error', '请输入目录路径');

            try {
                btn.disabled = true;
                showStatus('loading', '正在扫描目录并构建索引，这可能需要几分钟...');

                const res = await fetch('/api/build_from_dir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source_dir, glob, mode })
                });
                const data = await res.json();

                if (!res.ok || !data.ok) throw new Error(data.message);

                showStatus('success', `构建完成！处理 ${data.processed_files} 个文件，新增向量 ${data.added_chunks} 条`);
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showStatus('error', e.message || '操作失败');
            } finally {
                btn.disabled = false;
            }
        }

        async function loadKnowledgeList() {
            const source = document.getElementById('browseSource').value.trim();
            const limit = document.getElementById('browseLimit').value;
            const btn = document.getElementById('btnList');
            const list = document.getElementById('knowledgeList');
            list.innerHTML = '';

            try {
                btn.disabled = true;
                showStatus('loading', '正在加载知识内容...');
                const params = new URLSearchParams({ limit });
                if (source) params.append('source', source);
                const res = await fetch(`/api/knowledge/list?${params.toString()}`);
                const data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.message || '加载失败');

                if (!data.items.length) {
                    showStatus('success', '没有匹配的知识内容');
                    return;
                }

                showStatus('success', `已加载 ${data.items.length} 条内容`);
                renderKnowledgeList(data.items, false);
            } catch (e) {
                showStatus('error', e.message || '加载失败');
            } finally {
                btn.disabled = false;
            }
        }

        async function searchKnowledge() {
            const query = document.getElementById('browseQuery').value.trim();
            const limit = document.getElementById('browseLimit').value;
            const btn = document.getElementById('btnSearch');
            const list = document.getElementById('knowledgeList');
            list.innerHTML = '';

            if (!query) return showStatus('error', '请输入检索内容');

            try {
                btn.disabled = true;
                showStatus('loading', '正在检索相似内容...');
                const params = new URLSearchParams({ query, k: limit });
                const res = await fetch(`/api/knowledge/search?${params.toString()}`);
                const data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.message || '检索失败');

                if (!data.results.length) {
                    showStatus('success', '没有检索到相似内容');
                    return;
                }

                showStatus('success', `已检索到 ${data.results.length} 条结果`);
                renderKnowledgeList(data.results, true);
            } catch (e) {
                showStatus('error', e.message || '检索失败');
            } finally {
                btn.disabled = false;
            }
        }

        function renderKnowledgeList(items, showScore) {
            const list = document.getElementById('knowledgeList');
            list.innerHTML = '';
            items.forEach(item => {
                const source = item.source || item.metadata?.source || '未知来源';
                const score = typeof item.score === 'number' ? item.score.toFixed(4) : '';
                const div = document.createElement('div');
                div.className = 'knowledge-item';
                div.innerHTML = `
                    <div class="knowledge-meta">
                        <span>${source}</span>
                        ${showScore ? `<span class="knowledge-score">score: ${score}</span>` : ''}
                    </div>
                    <div class="knowledge-content">${item.content}</div>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
